<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 智能问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 25px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 13px;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            display: flex;
            margin-bottom: 20px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 75%;
            padding: 15px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: #f5f5f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user .message-avatar {
            margin-left: 10px;
            background: #e0e0e0;
        }

        .assistant .message-avatar {
            margin-right: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* 输入区域 */
        .input-container {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
        }

        #questionInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        #questionInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #sendBtn.loading {
            position: relative;
            color: transparent;
        }

        #sendBtn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .welcome-message h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }

        .welcome-message p {
            font-size: 14px;
            line-height: 1.6;
        }

        .example-questions {
            margin-top: 25px;
            text-align: left;
        }

        .example-questions h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .example-question {
            display: inline-block;
            background: #f5f5f5;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            margin: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-question:hover {
            background: #e8e8e8;
        }

        /* 引用来源 */
        .sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #ddd;
            font-size: 12px;
            color: #888;
        }

        .sources-title {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .source-item {
            background: #fafafa;
            padding: 6px 10px;
            border-radius: 4px;
            margin-top: 4px;
            font-size: 11px;
        }

        /* 光标闪烁效果 */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 18px;
            background: #667eea;
            margin-left: 4px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 RAG 智能问答</h1>
            <p>基于向量数据库的知识问答系统</p>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <!-- 欢迎消息 -->
            <div class="welcome-message" id="welcomeMessage">
                <h2>欢迎来到 RAG 智能问答</h2>
                <p>我可以基于已建立的知识库回答您的问题</p>

                <div class="example-questions">
                    <h3>试试问我这些问题：</h3>
                    <div class="example-question" onclick="askExample('什么是 RAG？')">什么是 RAG？</div>
                    <div class="example-question" onclick="askExample('如何构建向量索引？')">如何构建向量索引？</div>
                    <div class="example-question" onclick="askExample('文档分片的策略有哪些？')">文档分片的策略有哪些？</div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <textarea id="questionInput" placeholder="请输入您的问题..." rows="1" onkeypress="handleKeyPress(event)"></textarea>
            <button id="sendBtn" onclick="sendQuestion()">发送</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeMessage = document.getElementById('welcomeMessage');

        let currentAssistantMessage = null;

        // 示例问题
        function askExample(question) {
            questionInput.value = question;
            sendQuestion();
        }

        // 回车发送
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendQuestion();
            }
        }

        // 添加消息到聊天
        function appendMessage(role, content) {
            // 隐藏欢迎消息
            if (welcomeMessage) {
                welcomeMessage.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '🤖';

            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="message-avatar">${avatar}</div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv.querySelector('.message-content');
        }

        // 创建带光标的助手消息
        function createAssistantMessage() {
            if (welcomeMessage) {
                welcomeMessage.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content"><span class="content"></span><span class="cursor"></span></div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            currentAssistantMessage = {
                element: messageDiv,
                contentSpan: messageDiv.querySelector('.content'),
                cursor: messageDiv.querySelector('.cursor')
            };

            return currentAssistantMessage;
        }

        // 更新助手消息内容
        function updateAssistantMessage(content) {
            if (currentAssistantMessage) {
                currentAssistantMessage.contentSpan.textContent = content;
                currentAssistantMessage.element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // 完成助手消息（移除光标，添加引用）
        function finishAssistantMessage(sources = null) {
            if (currentAssistantMessage) {
                // 移除光标
                currentAssistantMessage.cursor.remove();

                // 添加引用来源
                if (sources && sources.length > 0) {
                    const sourcesHtml = `
                        <div class="sources">
                            <div class="sources-title">📎 引用来源：</div>
                            ${sources.map((s, i) => `<div class="source-item">${i + 1}. ${s}</div>`).join('')}
                        </div>
                    `;
                    currentAssistantMessage.contentSpan.parentElement.innerHTML += sourcesHtml;
                }

                currentAssistantMessage = null;
            }
        }

        // 发送问题 - 流式输出
        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            // 清空输入框
            questionInput.value = '';

            // 添加用户消息
            appendMessage('user', question);

            // 禁用发送按钮
            sendBtn.disabled = true;
            sendBtn.classList.add('loading');

            // 创建助手消息（带光标）
            createAssistantMessage();

            let accumulatedContent = '';

            try {
                // 调用后端流式接口
                const response = await fetch('/retrieval/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    updateAssistantMessage(`❌ 请求失败：${response.status} - ${errorText}`);
                    finishAssistantMessage();
                    return;
                }

                // 读取流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // 解码chunk
                    const chunk = decoder.decode(value, { stream: true });
                    accumulatedContent += chunk;
                    updateAssistantMessage(accumulatedContent);
                }

                // 流式传输完成
                finishAssistantMessage();

            } catch (error) {
                if (currentAssistantMessage) {
                    updateAssistantMessage(`❌ 网络错误：${error.message}`);
                    finishAssistantMessage();
                } else {
                    appendMessage('assistant', `❌ 网络错误：${error.message}`);
                }
            } finally {
                sendBtn.disabled = false;
                sendBtn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
