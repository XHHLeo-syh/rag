<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档向量化上传</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .title {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .upload-area.hidden {
            display: none;
        }

        .add-file-btn {
            display: inline-block;
            background: #f0f2ff;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .add-file-btn:hover {
            background: #e0e4ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        /* 文件列表样式 */
        .file-list {
            display: none;
            margin-bottom: 20px;
        }

        .file-list.show {
            display: block;
        }

        .file-item {
            display: flex;
            align-items: center;
            background: #f8f9ff;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 10px;
        }

        .file-icon {
            font-size: 24px;
            margin-right: 12px;
        }

        .file-info {
            flex: 1;
            overflow: hidden;
        }

        .file-name {
            color: #333;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            color: #999;
            font-size: 12px;
            margin-top: 2px;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }

        .remove-btn:hover {
            background: #ff3344;
        }

        .clear-all-btn {
            background: #ffa502;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .clear-all-btn:hover {
            background: #ff9900;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .submit-btn.loading {
            position: relative;
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .supported-formats {
            margin-top: 20px;
            text-align: center;
        }

        .supported-formats h4 {
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: normal;
        }

        .format-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }

        .format-tag {
            background: #f0f2ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .progress-section {
            display: none;
            margin-bottom: 15px;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">文档向量化上传</h1>
        <p class="subtitle">支持多文件批量上传，自动执行向量化存储</p>

        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <p class="upload-text">点击选择文件或拖拽文件到此处</p>
            <p class="upload-hint">支持多文件同时上传</p>
            <div class="add-file-btn" id="addFileBtn" style="display: none;">➕ 继续添加文件</div>
        </div>
        <input type="file" id="fileInput" multiple accept=".pdf,.txt,.md,.json,.html,.htm,.doc,.docx,.ppt,.pptx">

        <!-- 文件列表 -->
        <div class="file-list" id="fileList">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="color: #666; font-size: 14px;">已选择 <span id="fileCount">0</span> 个文件</span>
                <button class="clear-all-btn" id="clearAllBtn">清空全部</button>
            </div>
            <div id="fileItems"></div>
        </div>

        <!-- 提交按钮 -->
        <button class="submit-btn" id="submitBtn" disabled>开始向量化</button>

        <!-- 进度显示 -->
        <div class="progress-section" id="progressSection">
            <div class="progress-text"><span id="currentProgress">0</span> / <span id="totalProgress">0</span> 处理中...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- 结果展示 -->
        <div class="result" id="result"></div>

        <!-- 支持格式 -->
        <div class="supported-formats">
            <h4>支持的文件格式</h4>
            <div class="format-tags">
                <span class="format-tag">PDF</span>
                <span class="format-tag">TXT</span>
                <span class="format-tag">MD</span>
                <span class="format-tag">JSON</span>
                <span class="format-tag">HTML</span>
                <span class="format-tag">DOC</span>
                <span class="format-tag">DOCX</span>
                <span class="format-tag">PPT</span>
                <span class="format-tag">PPTX</span>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const addFileBtn = document.getElementById('addFileBtn');
        const fileList = document.getElementById('fileList');
        const fileItems = document.getElementById('fileItems');
        const fileCount = document.getElementById('fileCount');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const currentProgress = document.getElementById('currentProgress');
        const totalProgress = document.getElementById('totalProgress');

        // 存储选中的文件
        let selectedFiles = [];

        // 点击上传区域触发文件选择
        uploadArea.addEventListener('click', (e) => {
            // 如果点击的是添加按钮，不触发文件选择（按钮有自己的事件）
            if (e.target === addFileBtn || addFileBtn.contains(e.target)) {
                return;
            }
            fileInput.click();
        });

        // 添加文件按钮点击
        addFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });

        // 文件选择处理
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                addFiles(files);
            }
            // 清空 value，允许重复选择同一文件
            fileInput.value = '';
        });

        // 拖拽功能
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            if (files.length > 0) {
                addFiles(files);
            }
        });

        // 添加文件到列表
        function addFiles(files) {
            files.forEach(file => {
                selectedFiles.push({
                    file: file,
                    id: Date.now() + Math.random()
                });
            });
            renderFileList();
        }

        // 渲染文件列表
        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileList.classList.remove('show');
                // 没有文件时，隐藏添加按钮，显示原始上传区域
                addFileBtn.style.display = 'none';
                submitBtn.disabled = true;
                return;
            }

            fileList.classList.add('show');
            addFileBtn.style.display = 'inline-block';
            submitBtn.disabled = false;
            fileCount.textContent = selectedFiles.length;

            fileItems.innerHTML = selectedFiles.map(item => `
                <div class="file-item">
                    <span class="file-icon">📄</span>
                    <div class="file-info">
                        <div class="file-name" title="${item.file.name}">${item.file.name}</div>
                        <div class="file-size">${formatFileSize(item.file.size)}</div>
                    </div>
                    <button class="remove-btn" data-id="${item.id}">删除</button>
                </div>
            `).join('');

            // 绑定删除事件
            fileItems.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseFloat(e.target.dataset.id);
                    removeFile(id);
                });
            });
        }

        // 删除单个文件
        function removeFile(id) {
            selectedFiles = selectedFiles.filter(item => item.id !== id);
            renderFileList();
            result.classList.remove('show');
        }

        // 清空全部文件
        clearAllBtn.addEventListener('click', () => {
            selectedFiles = [];
            renderFileList();
            result.classList.remove('show');
        });

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // 提交上传
        submitBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            progressSection.classList.add('show');
            result.classList.remove('show', 'success', 'error');

            // 重置进度显示
            currentProgress.textContent = 0;
            totalProgress.textContent = selectedFiles.length;
            progressFill.style.width = '0%';

            const totalFiles = selectedFiles.length;
            let successCount = 0;
            let failCount = 0;
            const resultsDetail = [];

            for (let i = 0; i < selectedFiles.length; i++) {
                const item = selectedFiles[i];
                const formData = new FormData();
                formData.append('file', item.file);

                try {
                    const response = await fetch('/embedding/upload', {
                        method: 'POST',
                        body: formData
                    });

                    // 解析 JSON 响应
                    const results = await response.json();

                    // 处理返回的每个文件结果
                    results.forEach(r => {
                        if (r.success) {
                            successCount++;
                            resultsDetail.push(`✅ ${r.fileName}: ${r.message}`);
                        } else {
                            failCount++;
                            resultsDetail.push(`❌ ${r.fileName}: ${r.message}`);
                        }
                    });

                } catch (error) {
                    failCount++;
                    resultsDetail.push(`❌ ${item.file.name}: 请求失败 - ${error.message}`);
                }

                // 更新进度
                currentProgress.textContent = i + 1;
                progressFill.style.width = ((i + 1) / totalFiles * 100) + '%';
            }

            // 显示结果
            progressSection.classList.remove('show');
            result.classList.add('show');

            if (failCount === 0) {
                result.innerHTML = `<strong>✅ 全部处理成功！共 ${successCount} 个文件</strong>`;
                result.classList.add('success');
                // 成功后清空
                setTimeout(() => {
                    clearAllBtn.click();
                }, 2000);
            } else {
                result.innerHTML = `<strong>❌ 处理完成：成功 ${successCount} 个，失败 ${failCount} 个</strong><br><br>${resultsDetail.join('<br>')}`;
                result.classList.add('error');
            }

            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
